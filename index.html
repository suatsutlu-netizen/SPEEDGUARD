<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#080c14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SpeedGuard">
  <meta name="description" content="Tachymètre numérique avec alertes de vitesse">
  <meta name="mobile-web-app-capable" content="yes">

  <title>SpeedGuard HUD</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="apple-touch-icon" href="icons/icon-apple.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c14;
      --bg2: #0d1520;
      --bg3: #1a2535;
      --border: #1a2535;
      --border2: #2a3a4a;
      --text: #e0e8f0;
      --muted: #4a6a8a;
      --muted2: #3a5a7a;
      --accent: #4a8aba;
      --green: #2aff7a;
      --amber: #ffaa00;
      --red: #ff3a3a;
      --cyan: #00d4ff;
      --font-mono: 'Share Tech Mono', monospace;
      --font-hud: 'Rajdhani', sans-serif;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      display: flex;
      flex-direction: column;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-title {
      font-family: var(--font-hud);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .gps-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; letter-spacing: 1px; color: var(--cyan);
    }
    .gps-bars { display: flex; align-items: flex-end; gap: 2px; height: 12px; }
    .gps-bar { width: 3px; background: var(--cyan); border-radius: 1px; }
    .gps-bar:nth-child(1) { height: 3px; }
    .gps-bar:nth-child(2) { height: 6px; }
    .gps-bar:nth-child(3) { height: 9px; }
    .gps-bar:nth-child(4) { height: 12px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      transition: background 0.4s, box-shadow 0.4s;
    }
    .status-dot.warn { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
    .status-dot.alert { background: var(--red); box-shadow: 0 0 8px var(--red); animation: blink 0.5s ease-in-out infinite alternate; }
    @keyframes blink { from{opacity:1} to{opacity:0.2} }

    /* ── MAIN SPEED ── */
    .speed-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .speed-label {
      font-size: 10px; letter-spacing: 4px; color: var(--muted); margin-bottom: 4px;
    }
    .speed-value {
      font-family: var(--font-hud);
      font-size: clamp(80px, 22vw, 140px);
      font-weight: 700;
      line-height: 1;
      color: var(--green);
      transition: color 0.35s, text-shadow 0.35s;
      letter-spacing: -2px;
    }
    .speed-value.warn { color: var(--amber); text-shadow: 0 0 30px rgba(255,170,0,0.3); }
    .speed-value.alert { color: var(--red); text-shadow: 0 0 30px rgba(255,58,58,0.3); }
    .speed-unit { font-size: 13px; letter-spacing: 3px; color: var(--muted); margin-top: -6px; margin-bottom: 10px; }

    /* proximity bar */
    .prox-bar-wrap {
      width: 100%; height: 5px;
      background: var(--bg3); border-radius: 3px; overflow: hidden; margin-bottom: 4px;
    }
    .prox-bar-fill {
      height: 100%; border-radius: 3px;
      background: var(--green);
      transition: width 0.25s, background 0.35s;
    }
    .prox-bar-fill.warn { background: var(--amber); }
    .prox-bar-fill.alert { background: var(--red); }
    .prox-ticks {
      display: flex; justify-content: space-between;
      font-size: 8px; color: #1e2e40; letter-spacing: 1px;
    }

    /* state badge */
    .state-badge {
      position: absolute; top: 12px; right: 16px;
      font-size: 9px; letter-spacing: 2px;
      padding: 3px 8px; border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--muted2);
      background: var(--bg2);
      transition: color 0.35s, border-color 0.35s;
    }
    .state-badge.warn { color: var(--amber); border-color: rgba(255,170,0,0.3); }
    .state-badge.alert { color: var(--red); border-color: rgba(255,58,58,0.3); }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid; grid-template-columns: 1fr 1px 1fr;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .stat-divider { background: var(--border); }
    .stat-box { text-align: center; }
    .stat-lbl { font-size: 8px; letter-spacing: 2px; color: var(--muted2); margin-bottom: 3px; }
    .stat-num {
      font-family: var(--font-hud); font-size: 32px; font-weight: 700;
      color: var(--text); line-height: 1;
      transition: color 0.35s;
    }
    .stat-num.warn { color: var(--amber); }
    .stat-num.alert { color: var(--red); }
    .stat-unit { font-size: 8px; letter-spacing: 1px; color: var(--muted2); }

    /* ── LIMIT CONTROL ── */
    .limit-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .limit-info { display: flex; flex-direction: column; gap: 2px; }
    .limit-lbl { font-size: 8px; letter-spacing: 2px; color: var(--muted2); }
    .limit-val {
      font-family: var(--font-hud); font-size: 26px; font-weight: 700;
      color: #c0d8f0; letter-spacing: 2px;
    }
    .limit-range { font-size: 8px; color: #2a3a4a; letter-spacing: 1px; }
    .limit-controls { display: flex; align-items: center; gap: 8px; }
    .min-badge {
      font-size: 8px; letter-spacing: 1px;
      padding: 2px 7px; border-radius: 3px;
      border: 1px solid var(--border);
      color: var(--muted2);
      transition: color 0.3s, border-color 0.3s;
    }
    .min-badge.active { color: var(--red); border-color: rgba(255,58,58,0.3); }
    .btn-grp { display: flex; gap: 5px; }
    .hud-btn {
      width: 38px; height: 38px;
      background: var(--bg3); border: 1px solid var(--border2);
      color: var(--accent); border-radius: 5px; cursor: pointer;
      font-size: 18px; font-family: var(--font-mono);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .hud-btn:active { background: #2a3a4a; color: var(--text); transform: scale(0.95); }
    .hud-btn:disabled { opacity: 0.25; pointer-events: none; }

    /* ── CONTROLS GRID ── */
    .controls-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; padding: 10px 16px;
      flex-shrink: 0;
    }
    .ctrl-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .ctrl-lbl { font-size: 8px; letter-spacing: 2px; color: var(--muted2); margin-bottom: 3px; }
    .ctrl-val { font-size: 10px; color: var(--accent); letter-spacing: 1px; }

    /* toggle */
    .toggle-wrap {
      width: 44px; height: 24px;
      background: #0a0f1a; border: 1px solid var(--border);
      border-radius: 12px; position: relative; cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .toggle-wrap.on { background: #0a2a14; border-color: #1a7a3a; }
    .toggle-thumb {
      width: 18px; height: 18px; border-radius: 50%;
      background: #2a3a4a; position: absolute; top: 2px; left: 2px;
      transition: left 0.2s, background 0.2s;
    }
    .toggle-wrap.on .toggle-thumb { left: 22px; background: var(--green); }

    /* mute btn */
    .mute-btn {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px;
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      transition: background 0.15s;
      font-family: var(--font-mono); color: var(--accent);
      font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
      -webkit-tap-highlight-color: transparent;
    }
    .mute-btn:active { background: var(--bg3); }
    .mute-icon { font-size: 20px; color: var(--muted); transition: color 0.2s; }
    .mute-btn.muted .mute-icon { color: var(--red); }

    .mode-cycle-btn {
      background: transparent; border: 1px solid var(--border2);
      color: var(--muted); font-family: var(--font-mono);
      font-size: 9px; padding: 4px 8px; border-radius: 4px;
      cursor: pointer; letter-spacing: 1px;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .mode-cycle-btn:active { background: var(--bg3); color: var(--text); }

    .save-btn {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .save-icon { font-size: 18px; color: var(--muted2); }
    .save-val { font-size: 10px; color: var(--accent); letter-spacing: 1px; transition: color 0.3s; }

    /* ── INSTALL BANNER ── */
    #install-banner {
      display: none;
      align-items: center; justify-content: space-between;
      padding: 10px 16px;
      background: #0a1a28; border-top: 1px solid var(--border);
      font-size: 11px; color: var(--muted); letter-spacing: 1px;
      flex-shrink: 0;
    }
    #install-banner.visible { display: flex; }
    .install-btn {
      background: var(--bg3); border: 1px solid var(--border2);
      color: var(--cyan); font-family: var(--font-mono);
      font-size: 10px; padding: 5px 12px; border-radius: 4px;
      cursor: pointer; letter-spacing: 1px;
    }
    .install-dismiss {
      background: none; border: none; color: var(--muted2);
      font-size: 16px; cursor: pointer; padding: 0 4px;
    }

    /* ── OFFLINE TOAST ── */
    #offline-toast {
      position: fixed; bottom: calc(16px + var(--safe-bottom)); left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a0a; border: 1px solid #3a3a1a;
      color: var(--amber); font-size: 10px; letter-spacing: 2px;
      padding: 8px 16px; border-radius: 6px;
      transition: transform 0.3s; z-index: 100;
      white-space: nowrap;
    }
    #offline-toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <span class="header-title">SpeedGuard · HUD</span>
    <div class="header-right">
      <div class="gps-badge">
        <div class="gps-bars">
          <div class="gps-bar"></div>
          <div class="gps-bar"></div>
          <div class="gps-bar"></div>
          <div class="gps-bar"></div>
        </div>
        GPS
      </div>
      <div class="status-dot" id="status-dot"></div>
    </div>
  </div>

  <!-- SPEED SECTION -->
  <div class="speed-section">
    <div class="state-badge" id="state-badge">ZONE SÛRE</div>
    <div class="speed-label">VITESSE ACTUELLE</div>
    <div class="speed-value" id="speed-val">0</div>
    <div class="speed-unit">KM / H</div>
    <div class="prox-bar-wrap">
      <div class="prox-bar-fill" id="prox-bar" style="width:0%"></div>
    </div>
    <div class="prox-ticks">
      <span>0</span><span>40</span><span>80</span><span>120</span><span>160</span>
    </div>
  </div>

  <!-- STATS ROW -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-lbl">LIMITE ACTIVE</div>
      <div class="stat-num" id="limit-stat">110</div>
      <div class="stat-unit">KM / H</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-box">
      <div class="stat-lbl">MARGE</div>
      <div class="stat-num" id="margin-stat">110</div>
      <div class="stat-unit">KM/H RESTANTS</div>
    </div>
  </div>

  <!-- LIMIT CONTROL -->
  <div class="limit-row">
    <div class="limit-info">
      <div class="limit-lbl">VITESSE LIMITE</div>
      <div class="limit-val" id="limit-val">110 KM/H</div>
      <div class="limit-range">RÉGLABLE 10 – 150 KM/H</div>
    </div>
    <div class="limit-controls">
      <span class="min-badge" id="min-badge">MIN 10</span>
      <div class="btn-grp">
        <button class="hud-btn" id="btn-minus" onclick="changeLimit(-10)">−</button>
        <button class="hud-btn" onclick="changeLimit(10)">+</button>
      </div>
    </div>
  </div>

  <!-- CONTROLS GRID -->
  <div class="controls-grid">

    <!-- Alarm on/off -->
    <div class="ctrl-card">
      <div>
        <div class="ctrl-lbl">ALARME</div>
        <div class="ctrl-val" id="alarm-text">BIP CADENCÉ</div>
      </div>
      <div class="toggle-wrap on" id="alarm-toggle" onclick="toggleAlarm()">
        <div class="toggle-thumb"></div>
      </div>
    </div>

    <!-- Mute -->
    <button class="mute-btn" id="mute-btn" onclick="muteAlarm()">
      <span class="mute-icon" id="mute-icon">🔊</span>
      <span id="mute-label">COUPER</span>
    </button>

    <!-- Mode -->
    <div class="ctrl-card">
      <div>
        <div class="ctrl-lbl">MODE ALERTE</div>
        <div class="ctrl-val" id="mode-val">BIP CADENCÉ</div>
      </div>
      <button class="mode-cycle-btn" onclick="cycleMode()">CYCLE</button>
    </div>

    <!-- Save -->
    <div class="ctrl-card">
      <div class="save-btn" onclick="saveLimit()">
        <span class="save-icon">🔖</span>
        <div>
          <div class="ctrl-lbl">SAUVEGARDER</div>
          <div class="save-val" id="save-val">ENREGISTRER</div>
        </div>
      </div>
    </div>

  </div>

  <!-- INSTALL BANNER -->
  <div id="install-banner">
    <span>Installer SpeedGuard sur l'écran d'accueil</span>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="install-btn" id="install-btn">INSTALLER</button>
      <button class="install-dismiss" onclick="dismissInstall()">✕</button>
    </div>
  </div>

  <!-- OFFLINE TOAST -->
  <div id="offline-toast">MODE HORS LIGNE</div>

  <script src="app.js"></script>
</body>
</html>
